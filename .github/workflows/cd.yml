name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env: DATABASE_URL: ${{ secrets.DATABSE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Install goose
        uses: mscno/setup-goose@v1

      - name: Build Prod
        run: scripts/buildprod.sh

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Use gcloud CLI
        run: gcloud info

      - name: Build and push to GAR
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-495421/notely-ar-repo/notely:latest

      - name: Migrate Database
        run: ./scripts/migrateup.sh

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-495421/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-495421 --max-instances=4
